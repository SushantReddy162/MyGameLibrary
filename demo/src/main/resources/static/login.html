<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — My Game Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --card: #1a1a24;
            --border: #2a2a3a;
            --accent: #e8ff47;
            --accent2: #ff4757;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            width: 420px;
            max-width: 90vw;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .logo span { color: var(--accent); }

        .logo-sub {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--muted); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0a0a0f;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #d4eb30;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(232,255,71,0.25);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(255,71,87,0.1);
            border: 1px solid var(--accent2);
            color: var(--accent2);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">MY <span>GAME</span> LIBRARY</div>
    <div class="logo-sub">Sign in to your collection</div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username"/>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="register-link">
        Don't have an account? <a href="/register.html">Register</a>
    </div>
</div>

<script>
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        errorMsg.style.display = 'none';

        if (!username || !password) {
            errorMsg.textContent = 'Please enter both username and password.';
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({username, password})
            });

            const token = await res.text();

            if (token && token.length > 10) {
                localStorage.setItem('token', token);
                window.location.href = '/index.html';
            } else {
                errorMsg.textContent = 'Invalid username or password.';
                errorMsg.style.display = 'block';
            }
        } catch(e) {
            errorMsg.textContent = 'Could not connect to server. Please try again.';
            errorMsg.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
</script>
</body>
</html>
